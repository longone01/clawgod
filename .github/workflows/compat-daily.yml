name: Compat Daily

# Runs install.sh end-to-end on every supported platform against the current
# latest Claude Code from npm. Catches the kind of regression we hit when
# Anthropic bumps the embedded Bun runtime ahead of Bun's stable release.

on:
  schedule:
    - cron: '17 7 * * *'   # ~07:17 UTC daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - install.sh
      - .github/workflows/compat-daily.yml
  pull_request:
    paths:
      - install.sh
      - .github/workflows/compat-daily.yml

permissions:
  contents: write   # write needed to push the version-badge JSON to `badges` branch
  issues: write

# Opt every JS-based action (e.g. actions/checkout, actions/cache,
# actions/github-script) onto Node 24, ahead of GitHub forcing it on
# 2026-06-02. Silences the deprecation warning and keeps us aligned
# with the Node version we use to run patch.mjs / extract-natives.mjs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    # Single Linux runner — a Linux failure almost always means cross-platform
    # breakage upstream. macOS / Windows runners are 10x / 2x more expensive
    # than Linux on shared-tier accounting, so we don't burn them on a daily
    # signal.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun (canary)
        # Anthropic ships claude-code with bleeding-edge Bun (e.g. 1.3.14
        # before it leaves the canary channel). Stable Bun panics with
        # "Expected CommonJS module to have a function wrapper" when loading
        # cli.original.cjs extracted from a newer-Bun-built native binary.
        # setup-bun caches the canary binary by commit hash — same canary
        # build is restored from cache, new build re-downloads.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Cache ~/.npm (claude-code-<plat> tarball)
        # install.sh runs `npm pack @anthropic-ai/claude-code-linux-x64@latest`,
        # which lands the ~80 MB tarball in ~/.npm/_cacache. Reusing the cache
        # lets npm short-circuit the download when @latest hasn't bumped since
        # the last run; it still re-validates registry metadata, so we never
        # serve a stale binary on a real upgrade day.
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-claude-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            npm-claude-${{ runner.os }}-

      - name: Install ripgrep
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y ripgrep
          rg --version | head -1

      - name: Add ~/.local/bin to PATH (clawgod launcher install target)
        shell: bash
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Print runtime versions
        shell: bash
        run: |
          bun --version
          node --version
          uname -a

      - name: Run install.sh (npm-fallback path)
        # No official Claude binary pre-installed → install.sh exercises
        # its npm-registry fallback to fetch @anthropic-ai/claude-code-<plat>.
        # Capture output so the patch-result line can be asserted on; we
        # don't trust `patch.mjs --verify` because some patches have no
        # post-state sentinel (they use a regex-stale heuristic that
        # false-positives once the source survives a partial replacement).
        shell: bash
        run: |
          set -o pipefail
          bash install.sh 2>&1 | tee /tmp/install.log

      - name: Verify install artifacts
        shell: bash
        run: |
          ls -la "$HOME/.clawgod/" || true
          for f in cli.cjs cli.original.cjs patch.mjs extract-natives.mjs post-process.mjs .source-version; do
            test -e "$HOME/.clawgod/$f" || { echo "::error::missing ~/.clawgod/$f"; exit 1; }
          done
          echo "Source: $(cat "$HOME/.clawgod/.source-version")"

      - name: Assert all patches applied (parse install log)
        # patch.mjs prints "Result: A applied, S skipped, F failed".
        # F must be 0 — otherwise upstream has shifted enough that one of
        # our regex patches no longer matches and a feature is silently broken.
        shell: bash
        run: |
          line=$(grep -E 'Result: [0-9]+ applied, [0-9]+ skipped, [0-9]+ failed' /tmp/install.log | tail -1 || true)
          echo "Patch summary: ${line:-<not found>}"
          [[ -n "$line" ]] || { echo "::error::patch.mjs result line missing from install.sh output"; exit 1; }
          failed=$(echo "$line" | sed -E 's/.*skipped, ([0-9]+) failed.*/\1/')
          [[ "$failed" -eq 0 ]] || { echo "::error::patch.mjs reported $failed failed patches"; exit 1; }

      - name: Verify lean settings applied
        shell: bash
        run: |
          settings="$HOME/.claude/settings.json"
          [[ -f "$settings" ]] || { echo "::error::~/.claude/settings.json not created"; exit 1; }
          # Check that lean keys are present
          for key in disableWorkflows disableRemoteControl disableClaudeAiConnectors disableArtifact; do
            if ! grep -q "\"$key\"" "$settings"; then
              echo "::error::lean key $key missing from settings.json"
              cat "$settings"
              exit 1
            fi
          done
          for tool in DesignSync NotebookEdit CronCreate; do
            if ! grep -q "\"$tool\"" "$settings"; then
              echo "::error::deny tool $tool missing from settings.json"
              cat "$settings"
              exit 1
            fi
          done
          echo "Lean settings verified:"
          cat "$settings"

      - name: Verify lean-off / lean-on toggle
        shell: bash
        run: |
          # --lean-off should remove lean keys and create flag
          bash install.sh --no-upgrade --lean-off 2>&1 | tail -3
          [[ -f "$HOME/.clawgod/.lean-disabled" ]] || { echo "::error::.lean-disabled flag not created"; exit 1; }
          settings="$HOME/.claude/settings.json"
          if grep -q '"disableWorkflows"' "$settings"; then
            echo "::error::lean-off failed to remove disableWorkflows"
            cat "$settings"
            exit 1
          fi
          # --lean-on should restore
          bash install.sh --no-upgrade --lean-on 2>&1 | tail -3
          [[ ! -f "$HOME/.clawgod/.lean-disabled" ]] || { echo "::error::.lean-disabled flag not removed"; exit 1; }
          if ! grep -q '"disableWorkflows"' "$settings"; then
            echo "::error::lean-on failed to restore disableWorkflows"
            cat "$settings"
            exit 1
          fi
          echo "Lean toggle verified"

      - name: Smoke test — claude --version
        # Exercises the wrapper path:
        #   launcher → bun cli.cjs → require('./cli.original.cjs')
        # The Bun CJS-wrapper panic surfaces here, not at install time.
        shell: bash
        run: |
          set +e
          out=$(claude --version 2>&1)
          rc=$?
          set -e
          echo "$out"
          if echo "$out" | grep -q "Expected CommonJS module to have a function wrapper"; then
            echo "::error::Bun CJS-wrapper panic — local Bun lags the embedded Bun"
            exit 1
          fi
          [[ $rc -eq 0 ]] || { echo "::error::claude --version exited $rc"; exit 1; }

      - name: Functional checks — runtime invariants
        # Verify that clawgod's monkey-patches produce correct runtime state.
        # These catch issues like #133 (daemon/fork broken because
        # Bun.isStandaloneExecutable wasn't patched) before users hit them.
        shell: bash
        run: |
          # The launcher sets CLAUDE_CODE_EXECPATH before running bun cli.cjs.
          # Simulate the same env so cli.cjs monkey-patches take effect.
          exec_path="$HOME/.local/bin/claude.orig"
          export CLAUDE_CODE_EXECPATH="$exec_path"

          echo "── Checking fv() patched (Bun.isStandaloneExecutable → true) ──"
          # The patcher replaces fv(){return Bun.isStandaloneExecutable===!0}
          # with fv(){return!0}. If the original form is still present, the
          # patch missed and daemon/fork/multitool will break.
          if grep -q 'Bun\.isStandaloneExecutable===!0' "$HOME/.clawgod/cli.original.cjs"; then
            echo "::error::fv() not patched — Bun.isStandaloneExecutable===!0 still in source"
            exit 1
          fi
          echo "  fv() patched: OK"

          echo "── Checking process.execPath monkey-patch in wrapper ──"
          grep -q 'CLAUDE_CODE_EXECPATH' "$HOME/.clawgod/cli.cjs" || {
            echo "::error::cli.cjs missing CLAUDE_CODE_EXECPATH monkey-patch"
            exit 1
          }
          echo "  execPath patch: OK"

          echo "── Checking multitool dispatch (ugrep, bfs, rg) ──"
          for tool in ugrep bfs rg; do
            if ARGV0="$tool" "$exec_path" --version >/dev/null 2>&1; then
              echo "  $tool dispatch: OK"
            else
              echo "::error::multitool dispatch failed for $tool via $exec_path"
              exit 1
            fi
          done

          echo "── Checking openai-proxy.cjs exists ──"
          test -f "$HOME/.clawgod/openai-proxy.cjs" || { echo "::error::openai-proxy.cjs missing"; exit 1; }
          echo "  openai-proxy.cjs: OK ($(wc -c < "$HOME/.clawgod/openai-proxy.cjs") bytes)"

          echo "── All functional checks passed ──"

      - name: Publish supported-Claude-version badge
        # Write the version we just verified end-to-end to a JSON file on the
        # `badges` branch (force-pushed; that branch holds nothing else and is
        # never read as source). README links to it via shields.io endpoint.
        # PRs from forks can't push, so skip them.
        if: success() && github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(cat "$HOME/.clawgod/.source-version")
          [[ -n "$version" ]] || { echo "::error::source-version missing"; exit 1; }
          tmp=$(mktemp -d)
          cd "$tmp"
          cat > claude-version.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Claude tested",
            "message": "$version",
            "color": "brightgreen"
          }
          EOF
          git init -q -b badges
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add claude-version.json
          git commit -q -m "compat-daily: claude $version verified"
          git push -fq "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:badges
          echo "Published badge: claude $version"

      - name: Open / update issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const stamp = path.join(process.env.HOME, '.clawgod', '.source-version');
            const claudeVersion = fs.existsSync(stamp)
              ? fs.readFileSync(stamp, 'utf8').trim()
              : 'unknown';
            const title = `compat-daily: broke (claude ${claudeVersion})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'compat-broken',
              per_page: 100,
            });
            const dup = open.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Re-failed ${new Date().toISOString().slice(0,10)} — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['compat-broken', 'bug'],
                body: [
                  `Daily compatibility run failed on \`ubuntu-latest\`.`,
                  ``,
                  `- Claude binary: \`${claudeVersion}\``,
                  `- Run: ${runUrl}`,
                  ``,
                  `Auto-opened by \`.github/workflows/compat-daily.yml\`.`,
                ].join('\n'),
              });
            }
