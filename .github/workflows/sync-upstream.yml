name: Sync upstream and create version branches

on:
  schedule:
    - cron: "7,22,37,52 * * * *"

  workflow_dispatch:

# 实际写入使用 SYNC_TOKEN。
# 内置 GITHUB_TOKEN 不需要写权限。
permissions:
  contents: read

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPO: 0Chencc/clawgod
  UPSTREAM_BRANCH: main
  VERSION_BRANCH_PREFIX: version/

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check sync token
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Repository secret SYNC_TOKEN is missing."
            exit 1
          fi

      - name: Sync fork main branch
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          echo "Syncing ${GITHUB_REPOSITORY}:${UPSTREAM_BRANCH}"
          echo "From upstream ${UPSTREAM_REPO}:${UPSTREAM_BRANCH}"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/merge-upstream" \
            -f "branch=${UPSTREAM_BRANCH}"

      - name: Create branches for upstream version tags
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          gh auth setup-git

          mkdir repository
          cd repository

          # 明确指定初始分支名，避免 master 提示
          git init -b main

          git remote add origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

          git remote add upstream \
            "https://github.com/${UPSTREAM_REPO}.git"

          echo "Fetching fork branches..."

          git fetch \
            --no-tags \
            --prune \
            origin \
            "+refs/heads/*:refs/remotes/origin/*"

          echo "Fetching upstream version tags..."

          # 显式获取 v* Tag 到独立命名空间。
          # --no-tags 可以阻止 Git 再自动获取一份普通 Tag。
          git fetch \
            --no-tags \
            --prune \
            upstream \
            "+refs/tags/v*:refs/tags/upstream/v*"

          created=0

          while IFS= read -r tag_ref; do
            [ -n "${tag_ref}" ] || continue

            tag="${tag_ref#refs/tags/upstream/}"
            branch="${VERSION_BRANCH_PREFIX}${tag}"
            target_commit="$(git rev-parse "${tag_ref}^{commit}")"

            if git show-ref \
              --verify \
              --quiet \
              "refs/remotes/origin/${branch}"; then

              existing_commit="$(
                git rev-parse "refs/remotes/origin/${branch}"
              )"

              if [ "${existing_commit}" = "${target_commit}" ]; then
                echo "Already exists: ${branch} -> ${target_commit}"
              else
                echo "::warning::Branch ${branch} already exists at ${existing_commit}; expected ${target_commit}. It will not be overwritten."
              fi

              continue
            fi

            echo "Creating ${branch} from ${tag}..."

            git update-ref \
              "refs/heads/${branch}" \
              "${target_commit}"

            git push origin \
              "refs/heads/${branch}:refs/heads/${branch}"

            git update-ref -d \
              "refs/heads/${branch}"

            echo "Created: ${branch} -> ${target_commit}"

            created=$((created + 1))
          done < <(
            git for-each-ref \
              --sort=version:refname \
              --format='%(refname)' \
              "refs/tags/upstream/v*"
          )

          echo "Created ${created} new version branch(es)."
